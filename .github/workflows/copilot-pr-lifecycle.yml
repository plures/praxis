name: Copilot PR Lifecycle

# Event-driven: responds to PR state changes, not polling.
# Copilot SWE agent emits pull_request.opened when done.
# The 30-min delay is a safety net if the PR is still draft.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to process (leave empty for all bot PRs)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: copilot-pr-lifecycle-${{ github.event.pull_request.number || github.event.inputs.pr_number || 'dispatch' }}
  cancel-in-progress: true

jobs:
  lifecycle:
    name: PR Lifecycle
    runs-on: ubuntu-latest
    # Only run for Copilot-authored PRs (or manual dispatch)
    # NOTE: GitHub Copilot SWE agent's user.login is 'Copilot' (capital C)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'check_suite' ||
      github.event_name == 'pull_request_review' ||
      (github.event.pull_request.user.login == 'Copilot' ||
       github.event.pull_request.user.login == 'copilot-swe-agent[bot]' ||
       github.event.pull_request.user.login == 'app/copilot-swe-agent')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PLURES_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Auto-format Copilot PR branch
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.PLURES_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set +e  # Don't fail on errors — this step is best-effort
          
          PR_STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state' 2>/dev/null)
          if [[ "$PR_STATE" == "MERGED" || "$PR_STATE" == "CLOSED" ]]; then
            echo "PR already $PR_STATE, skipping auto-format"
            exit 0
          fi
          
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')
          
          # Only auto-format Copilot PRs
          if [[ "$PR_AUTHOR" != "Copilot" && "$PR_AUTHOR" != "copilot-swe-agent" && "$PR_AUTHOR" != "app/copilot-swe-agent" ]]; then
            echo "Not a Copilot PR, skipping auto-format"
            exit 0
          fi
          
          # Fetch the branch — may not exist if already deleted
          git fetch origin "$PR_BRANCH" 2>/dev/null || { echo "Branch gone, skipping"; exit 0; }
          git checkout "$PR_BRANCH" 2>/dev/null || git checkout -b "$PR_BRANCH" "origin/$PR_BRANCH" 2>/dev/null || { echo "Cannot checkout branch, skipping"; exit 0; }
          
          # Run deno fmt
          deno fmt 2>&1 || true
          
          # Check if anything changed
          if git diff --quiet; then
            echo "No formatting changes needed"
          else
            echo "Formatting changes detected, committing..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format via deno fmt"
            git push origin "$PR_BRANCH"
            echo "Format fix pushed. Workflow will re-trigger on synchronize."
          fi

      - name: Copilot PR Lifecycle Engine
        uses: actions/github-script@v7
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number || '' }}
          REVIEW_STATE: ${{ github.event.review.state || '' }}
        with:
          github-token: ${{ secrets.PLURES_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = process.env.EVENT_NAME;
            const eventAction = process.env.EVENT_ACTION;
            const reviewState = process.env.REVIEW_STATE;

            // ─── Helpers ─────────────────────────────────────────────
            const COPILOT_AUTHORS = new Set([
              'Copilot',
              'copilot-swe-agent[bot]',
              'app/copilot-swe-agent',
              'copilot-swe-agent',
            ]);

            function isCopilotPR(pr) {
              return COPILOT_AUTHORS.has(pr.user?.login) || COPILOT_AUTHORS.has(pr.author?.login);
            }

            async function ledgerEntry(kind, prNumber, summary, details) {
              const body = [
                `### Ledger: ${kind}`,
                `**PR:** #${prNumber}`,
                `**Time:** ${new Date().toISOString()}`,
                `**Summary:** ${summary}`,
                details ? `**Details:** ${JSON.stringify(details)}` : '',
              ].filter(Boolean).join('\n');
              core.info(`[LEDGER] ${kind} PR#${prNumber}: ${summary}`);
              // Could write to ops/ledger/ via commit — for now, structured log
              return body;
            }

            // ─── Collect target PRs ──────────────────────────────────
            let targetPRs = [];

            if (process.env.PR_NUMBER) {
              const { data: pr } = await github.rest.pulls.get({
                owner, repo,
                pull_number: parseInt(process.env.PR_NUMBER),
              });
              if (isCopilotPR(pr)) targetPRs.push(pr);
            } else if (eventName === 'check_suite') {
              // check_suite doesn't have a PR number directly — find PRs on the branch
              const headBranch = context.payload?.check_suite?.head_branch;
              if (headBranch) {
                const { data: prs } = await github.rest.pulls.list({
                  owner, repo, state: 'open', head: `${owner}:${headBranch}`,
                });
                targetPRs = prs.filter(isCopilotPR);
              }
            } else if (eventName === 'workflow_dispatch' && !process.env.PR_NUMBER) {
              const { data: prs } = await github.rest.pulls.list({
                owner, repo, state: 'open', per_page: 50,
              });
              targetPRs = prs.filter(isCopilotPR);
            } else if (context.payload?.pull_request) {
              targetPRs = [context.payload.pull_request];
            }

            if (targetPRs.length === 0) {
              core.info('No Copilot PRs to process.');
              return;
            }

            // ─── Process each PR ─────────────────────────────────────
            for (const pr of targetPRs) {
              const prNum = pr.number;
              const prTitle = pr.title;
              core.info(`\n${'='.repeat(60)}\nProcessing PR #${prNum}: ${prTitle}\n${'='.repeat(60)}`);

              // Phase 1: Draft → Ready
              if (pr.draft) {
                core.info(`PR #${prNum} is draft. Marking ready for review...`);
                try {
                  await github.graphql(`
                    mutation($id: ID!) {
                      markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                        pullRequest { number }
                      }
                    }
                  `, { id: pr.node_id });
                  core.info(`PR #${prNum} marked ready.`);
                  await ledgerEntry('draft-to-ready', prNum, 'Auto-marked draft PR as ready for review');
                } catch (e) {
                  core.warning(`Could not mark PR #${prNum} ready: ${e.message}`);
                }
                // After marking ready, GitHub will fire ready_for_review event
                // which re-triggers this workflow. Don't proceed further this run.
                continue;
              }

              // Phase 2: Request Copilot review (if not already reviewed)
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner, repo, pull_number: prNum,
              });
              const copilotReviewed = reviews.some(
                r => r.user?.login === 'copilot-pull-request-reviewer' ||
                     r.user?.login === 'github-actions[bot]'
              );

              if (!copilotReviewed && eventAction !== 'submitted') {
                core.info(`PR #${prNum}: Requesting Copilot review...`);
                try {
                  await github.rest.pulls.requestReviewers({
                    owner, repo, pull_number: prNum,
                    reviewers: ['copilot-pull-request-reviewer'],
                  });
                  core.info(`Copilot review requested on PR #${prNum}. Waiting for review before merge.`);
                } catch (e) {
                  core.info(`Could not request Copilot review: ${e.message}. Proceeding without review.`);
                  // If Copilot reviewer unavailable, fall through to merge
                }
                // Stop here — wait for the review_submitted event to re-trigger this workflow
                if (!copilotReviewed) {
                  await ledgerEntry('review-requested', prNum, `Copilot review requested, awaiting response`);
                  continue;
                }
              }

              // Phase 3: Handle review feedback
              if (eventName === 'pull_request_review' && reviewState === 'changes_requested') {
                const latestReview = reviews[reviews.length - 1];
                if (latestReview) {
                  core.info(`PR #${prNum}: Changes requested. Asking Copilot to implement...`);
                  // Check for code suggestions
                  const { data: reviewComments } = await github.rest.pulls.listReviewComments({
                    owner, repo, pull_number: prNum,
                  });
                  const hasSuggestions = reviewComments.some(c => c.body?.includes('```suggestion'));

                  const commentBody = hasSuggestions
                    ? '@copilot Please implement all review suggestions and push the changes.'
                    : '@copilot Changes were requested in the review. Please address the feedback and push fixes.';

                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNum,
                    body: commentBody,
                  });
                  await ledgerEntry('changes-requested', prNum, 'Review feedback forwarded to Copilot');
                }
                continue;
              }

              // Phase 4: Check for merge conflicts
              // Refetch to get current mergeable status
              const { data: freshPR } = await github.rest.pulls.get({
                owner, repo, pull_number: prNum,
              });

              if (freshPR.mergeable === false || freshPR.merge_state_status === 'DIRTY') {
                core.info(`PR #${prNum} has merge conflicts.`);
                // Close and refile — Copilot can't rebase, fresh implementation is cleaner
                const linkedIssue = (freshPR.body || '').match(/(?:closes|fixes|resolves)\s*#(\d+)/i);
                const issueRef = linkedIssue ? linkedIssue[1] : null;

                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNum,
                  body: `Closing due to merge conflicts with main. Will refile for fresh implementation.`,
                });
                await github.rest.pulls.update({
                  owner, repo, pull_number: prNum, state: 'closed',
                });
                // Delete the branch
                try {
                  await github.rest.git.deleteRef({
                    owner, repo, ref: `heads/${freshPR.head.ref}`,
                  });
                } catch (_e) { /* branch may already be gone */ }

                // Create new issue for fresh implementation
                const newIssue = await github.rest.issues.create({
                  owner, repo,
                  title: prTitle,
                  body: [
                    `Re-implementation of closed PR #${prNum} which had merge conflicts.`,
                    issueRef ? `**Original issue:** #${issueRef}` : '',
                    '',
                    'Please implement this fresh against current `main`. Do not rebase the old branch.',
                    '',
                    'Review the current codebase state before starting.',
                  ].filter(Boolean).join('\n'),
                  assignees: [],
                });

                // Assign to Copilot
                try {
                  const issueNode = await github.graphql(`
                    query($owner: String!, $repo: String!, $num: Int!) {
                      repository(owner: $owner, name: $repo) {
                        issue(number: $num) { id }
                      }
                    }
                  `, { owner, repo, num: newIssue.data.number });
                  await github.graphql(`
                    mutation($id: ID!) {
                      addAssigneesToAssignable(input: {
                        assignableId: $id,
                        assigneeIds: ["BOT_kgDOC9w8XQ"]
                      }) { clientMutationId }
                    }
                  `, { id: issueNode.repository.issue.id });
                } catch (e) {
                  core.info(`Could not assign Copilot: ${e.message}`);
                }

                await ledgerEntry('conflict-refile', prNum,
                  `Closed conflicting PR, refiled as #${newIssue.data.number}`);
                continue;
              }

              // Phase 5: Merge — only after Copilot review is APPROVED
              // Flow: review requested → changes_requested → Copilot implements → re-review → approved → merge
              const approvedReview = reviews.some(
                r => r.state === 'APPROVED' && (
                  r.user?.login === 'copilot-pull-request-reviewer' ||
                  r.user?.login === 'github-actions[bot]'
                )
              );

              if (!approvedReview) {
                // Review exists but not approved — still waiting for feedback cycle to complete
                const hasReview = reviews.length > 0;
                if (hasReview) {
                  core.info(`PR #${prNum}: Review not yet approved. Waiting for review cycle to complete.`);
                  await ledgerEntry('awaiting-approval', prNum, 'Review in progress, not yet approved');
                } else {
                  core.info(`PR #${prNum}: No reviews yet. Waiting for Copilot review.`);
                }
                continue;
              }

              core.info(`PR #${prNum}: Copilot review approved. Merging...`);

              try {
                await github.rest.pulls.merge({
                  owner, repo, pull_number: prNum,
                  merge_method: 'squash',
                });
                core.info(`✅ PR #${prNum} merged!`);

                // Delete branch
                try {
                  await github.rest.git.deleteRef({
                    owner, repo, ref: `heads/${freshPR.head.ref}`,
                  });
                } catch (_e) { /* already deleted */ }

                await ledgerEntry('merge', prNum, `Squash merged: ${prTitle}`, {
                  sourceBranch: freshPR.head.ref,
                  targetBranch: freshPR.base.ref,
                });
              } catch (e) {
                // Merge may fail due to branch protection — try enabling auto-merge
                core.warning(`Direct merge failed: ${e.message}. Enabling auto-merge...`);
                try {
                  await github.graphql(`
                    mutation($prId: ID!) {
                      enablePullRequestAutoMerge(input: {
                        pullRequestId: $prId,
                        mergeMethod: SQUASH
                      }) { clientMutationId }
                    }
                  `, { prId: freshPR.node_id });
                  core.info(`Auto-merge enabled for PR #${prNum}.`);
                  await ledgerEntry('auto-merge-enabled', prNum, 'Direct merge blocked by branch protection; auto-merge enabled');
                } catch (e2) {
                  core.warning(`Auto-merge also failed: ${e2.message}. PR needs manual merge or protection policy change.`);
                  await ledgerEntry('merge-blocked', prNum,
                    `Cannot merge: ${e.message}. Auto-merge also failed: ${e2.message}`);
                }
              }
            }

            core.info('\nLifecycle run complete.');
