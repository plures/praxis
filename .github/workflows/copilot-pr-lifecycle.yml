name: Copilot PR Lifecycle

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, closed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged != true &&
      github.event.pull_request.user.login == 'Copilot'
    steps:
      - name: Mark ready for review
        if: github.event.action == 'opened' && github.event.pull_request.draft == true
        run: gh pr ready ${{ github.event.pull_request.number }} -R ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Request Copilot code review
        if: github.event.action == 'opened' || github.event.action == 'ready_for_review'
        run: |
          gh pr edit ${{ github.event.pull_request.number }} -R ${{ github.repository }} \
            --add-reviewer copilot || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve after Copilot review
        if: >-
          github.event_name == 'pull_request_review' &&
          github.event.review.user.login == 'copilot-pull-request-reviewer[bot]'
        run: |
          echo "Copilot code review completed (state: ${{ github.event.review.state }})"

          # Wait briefly for CI to settle
          sleep 10

          # Check CI status via API (gh pr checks doesn't support --json in this version)
          CHECKS=$(gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs \
            --jq '.check_runs[] | select(.name != "lifecycle" and .name != "queue-advance" and .name != "Copilot code review") | "\(.name):\(.conclusion)"')

          FAILING=$(echo "$CHECKS" | grep -v ":success" | grep -v ":skipped" | grep -v ":null" | grep -v "^$" || true)

          if [ -n "$FAILING" ]; then
            echo "❌ CI checks not passing:"
            echo "$FAILING"
            gh pr comment ${{ github.event.pull_request.number }} -R ${{ github.repository }} \
              --body "@copilot CI checks are failing. Please fix these issues:
          $(echo "$FAILING" | sed 's/^/- /')" || true
            exit 0
          fi

          echo "✅ All CI checks passing — auto-approving"
          gh pr review ${{ github.event.pull_request.number }} -R ${{ github.repository }} \
            --approve -b "Auto-approved: Copilot code review completed and all CI checks pass."
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}

      - name: Auto-merge when approved
        if: >-
          github.event_name == 'pull_request_review' &&
          github.event.review.state == 'approved'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} -R ${{ github.repository }} \
            --squash --delete-branch || \
          gh pr merge ${{ github.event.pull_request.number }} -R ${{ github.repository }} \
            --squash --auto --delete-branch || true
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}

  queue-advance:
    runs-on: ubuntu-latest
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    steps:
      - name: Assign next issue to Copilot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const botId = 'BOT_kgDOC9w8XQ';
            const alertPrefixes = ['[cross-repo]', '[ci-feedback]', '[praxis-health]'];

            // ADR-0004: one-pr-per-repo constraint
            const openPRs = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 5
            });
            if (openPRs.data.length > 0) {
              console.log(`⏸️ ${openPRs.data.length} open PR(s) — waiting for them to merge first`);
              return;
            }

            // Check if Copilot already has an open issue assigned
            const issues = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 100
            });
            const copilotIssues = issues.data.filter(i =>
              !i.pull_request &&
              i.assignees.some(a => a.login === 'Copilot')
            );
            if (copilotIssues.length > 0) {
              console.log(`Copilot already assigned to #${copilotIssues[0].number}, skipping`);
              return;
            }

            // ADR-0004: copilot-issues-must-have-milestone
            const milestones = await github.rest.issues.listMilestones({
              owner, repo, state: 'open', sort: 'title', direction: 'asc'
            });

            for (const ms of milestones.data) {
              const msIssues = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', milestone: ms.number,
                sort: 'created', direction: 'asc', per_page: 20
              });

              const next = msIssues.data.find(i => {
                if (i.pull_request) return false;
                if (i.assignees.some(a => a.login === 'Copilot')) return false;
                if (alertPrefixes.some(p => i.title.includes(p))) return false;
                return true;
              });

              if (next) {
                // ADR-0004: label + type required or Copilot silently cancels
                if (next.labels.length === 0) {
                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: next.number,
                    labels: ['enhancement']
                  });
                  console.log(`  Added 'enhancement' label to #${next.number}`);
                }

                // Set issue type to Feature (ADR-0004 constraint)
                try {
                  await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                    owner, repo, issue_number: next.number,
                    type: 'Feature'
                  });
                  console.log(`  Set type=Feature on #${next.number}`);
                } catch (e) {
                  console.log(`  Could not set type (non-fatal): ${e.message}`);
                }

                // Assign Copilot via GraphQL
                await github.graphql(`
                  mutation($id: ID!, $assignees: [ID!]!) {
                    addAssigneesToAssignable(input: { assignableId: $id, assigneeIds: $assignees }) {
                      clientMutationId
                    }
                  }
                `, { id: next.node_id, assignees: [botId] });

                await github.rest.issues.createComment({
                  owner, repo, issue_number: next.number,
                  body: '@copilot Please implement this issue.'
                });

                console.log(`✅ Assigned Copilot to #${next.number}: ${next.title} (milestone: ${ms.title})`);
                return;
              }
            }

            console.log('🎉 No eligible milestoned issues remaining');
