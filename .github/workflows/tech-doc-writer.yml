name: Tech Doc Writer

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.title, '[docs]') &&
      !contains(github.event.pull_request.title, 'chore(docs)')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - name: Gather diff context
        id: context
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUM="${{ github.event.pull_request.number }}"

          # Get actual code diff (excluding docs/config)
          DIFF=$(git diff HEAD~1 HEAD -- ':(exclude)*.md' ':(exclude)*.yml' ':(exclude)*.json' ':(exclude).github/' ':(exclude)docs/' | head -500)
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          SRC_CHANGES=$(echo "$CHANGED" | grep -vE '^\.(github|gitignore)|^(README|CHANGELOG|docs/|\.)|\.md$|\.yml$|\.json$' | head -1)

          if [ -z "$SRC_CHANGES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No source code changes — skipping"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"

          # Write diff to file for multiline output
          echo "$CHANGED" > /tmp/changed_files.txt
          echo "$DIFF" > /tmp/code_diff.txt

      - name: Create doc update issue
        if: steps.context.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const botId = 'BOT_kgDOC9w8XQ';
            const prNum = ${{ github.event.pull_request.number }};
            const prTitle = `${{ steps.context.outputs.pr_title }}`;

            const changedFiles = fs.readFileSync('/tmp/changed_files.txt', 'utf8').trim();
            const codeDiff = fs.readFileSync('/tmp/code_diff.txt', 'utf8').trim();

            // Dedup check
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'documentation', per_page: 20
            });
            if (existing.data.some(i => i.title.includes(`PR #${prNum}`))) {
              console.log('Doc issue already exists');
              return;
            }

            const body = `## Documentation Update Required

            PR #${prNum} (\`${prTitle}\`) merged code changes that may affect documentation.

            > ⚠️ **Do NOT assume existing docs are correct.** Verify all doc claims against the actual source code. Use \`git diff HEAD~1 HEAD\` as your source of truth.

            ### Changed Files
            \`\`\`
            ${changedFiles}
            \`\`\`

            ### Code Diff (truncated)
            \`\`\`diff
            ${codeDiff.substring(0, 3000)}
            \`\`\`

            ### Tasks
            - [ ] Review the diff above and identify what changed in public API, behavior, or configuration
            - [ ] Update README.md if public API or usage changed
            - [ ] Update or create relevant docs/ files
            - [ ] Update CHANGELOG.md with entry
            - [ ] Verify all code examples in docs compile/run against current source

            ---
            _Auto-generated by Tech Doc Writer (ADR-0005)_`.replace(/^            /gm, '');

            const issue = await github.rest.issues.create({
              owner, repo,
              title: `[docs] Update documentation for PR #${prNum}: ${prTitle}`,
              body,
              labels: ['documentation']
            });

            try {
              await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                owner, repo, issue_number: issue.data.number, type: 'Task'
              });
            } catch (e) { console.log(`Type: ${e.message}`); }

            // Assign Copilot immediately — doc debt blocks feature queue (ADR-0005)
            await github.graphql(`
              mutation($id: ID!, $assignees: [ID!]!) {
                addAssigneesToAssignable(input: { assignableId: $id, assigneeIds: $assignees }) {
                  clientMutationId
                }
              }
            `, { id: issue.data.node_id, assignees: [botId] });

            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.data.number,
              body: '@copilot Update the documentation based on the code diff in this issue. Do NOT trust existing docs — verify against actual source code.'
            });

            console.log(`📝 Created doc issue #${issue.data.number} (priority: blocks feature queue)`);
