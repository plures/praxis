name: Tech Doc Writer

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.title, '[docs]') &&
      !contains(github.event.pull_request.title, 'chore(docs)')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Gather PR context
        id: context
        run: |
          echo "pr_title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "pr_body<<PREOF" >> "$GITHUB_OUTPUT"
          echo "${{ github.event.pull_request.body }}" >> "$GITHUB_OUTPUT"
          echo "PREOF" >> "$GITHUB_OUTPUT"

          # Get changed files
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "changed_files<<CFEOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "CFEOF" >> "$GITHUB_OUTPUT"

          # Detect if this is a feature, fix, or other
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" == feat* ]]; then
            echo "change_type=feature" >> "$GITHUB_OUTPUT"
          elif [[ "$TITLE" == fix* ]]; then
            echo "change_type=fix" >> "$GITHUB_OUTPUT"
          else
            echo "change_type=other" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if docs need updating
        id: check
        run: |
          CHANGED="${{ steps.context.outputs.changed_files }}"
          # Skip if only docs/workflows/config changed
          SRC_CHANGES=$(echo "$CHANGED" | grep -vE '^\.(github|gitignore)|^(README|CHANGELOG|docs/|\.)|\.md$|\.yml$|\.json$' | head -1)
          if [ -z "$SRC_CHANGES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No source code changes — skipping doc update"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Source changes detected — will create doc update issue"
          fi

      - name: Create doc update issue for Copilot
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const botId = 'BOT_kgDOC9w8XQ';
            const prTitle = `${{ steps.context.outputs.pr_title }}`;
            const prNum = ${{ steps.context.outputs.pr_number }};
            const changeType = `${{ steps.context.outputs.change_type }}`;
            const changedFiles = `${{ steps.context.outputs.changed_files }}`;

            // Check for existing open doc issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'documentation',
              per_page: 10
            });
            if (existing.data.some(i => i.title.includes(`[docs] PR #${prNum}`))) {
              console.log('Doc issue already exists for this PR');
              return;
            }

            // Don't create doc issues if there's already an open Copilot PR
            const openPRs = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 5
            });
            const copilotPRs = openPRs.data.filter(p => p.user.login === 'Copilot');
            if (copilotPRs.length > 0) {
              console.log(`⏸️ Copilot already has PR #${copilotPRs[0].number} open — queuing doc update`);
              // Still create the issue but don't assign Copilot yet
              const issue = await github.rest.issues.create({
                owner, repo,
                title: `[docs] Update documentation for PR #${prNum}: ${prTitle}`,
                body: `## Documentation Update Needed\n\nPR #${prNum} (\`${prTitle}\`) merged ${changeType} changes.\n\n### Changed Files\n\`\`\`\n${changedFiles}\n\`\`\`\n\n### Tasks\n- [ ] Update README.md if public API changed\n- [ ] Update or create relevant docs/ files\n- [ ] Update CHANGELOG.md with entry for this change\n- [ ] Ensure code examples in docs match current API\n\n---\n_Auto-generated by Tech Doc Writer_`,
                labels: ['documentation']
              });
              console.log(`📝 Created doc issue #${issue.data.number} (queued, Copilot busy)`);
              return;
            }

            // Create and assign to Copilot
            const issue = await github.rest.issues.create({
              owner, repo,
              title: `[docs] Update documentation for PR #${prNum}: ${prTitle}`,
              body: `## Documentation Update Needed\n\nPR #${prNum} (\`${prTitle}\`) merged ${changeType} changes.\n\n### Changed Files\n\`\`\`\n${changedFiles}\n\`\`\`\n\n### Tasks\n- [ ] Update README.md if public API changed\n- [ ] Update or create relevant docs/ files\n- [ ] Update CHANGELOG.md with entry for this change\n- [ ] Ensure code examples in docs match current API\n\n---\n_Auto-generated by Tech Doc Writer_`,
              labels: ['documentation']
            });

            // Set type
            try {
              await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                owner, repo, issue_number: issue.data.number, type: 'Task'
              });
            } catch (e) { console.log(`Type set failed: ${e.message}`); }

            // Assign Copilot
            await github.graphql(`
              mutation($id: ID!, $assignees: [ID!]!) {
                addAssigneesToAssignable(input: { assignableId: $id, assigneeIds: $assignees }) {
                  clientMutationId
                }
              }
            `, { id: issue.data.node_id, assignees: [botId] });

            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.data.number,
              body: '@copilot Please update the documentation based on the changes in PR #' + prNum + '. Focus on README, API docs, and CHANGELOG.'
            });

            console.log(`📝 Created and assigned doc issue #${issue.data.number}`);
