name: Auto Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: auto-version-bump-main
  cancel-in-progress: false

jobs:
  bump:
    if: github.event.pull_request.merged == true && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Determine version bump
        id: bump
        shell: bash
        run: |
          labels='${{ toJson(github.event.pull_request.labels) }}'
          level="patch"

          if echo "$labels" | jq -e '.[] | select(.name=="semver:major")' >/dev/null; then
            level="major"
          elif echo "$labels" | jq -e '.[] | select(.name=="semver:minor")' >/dev/null; then
            level="minor"
          elif echo "$labels" | jq -e '.[] | select(.name=="semver:patch")' >/dev/null; then
            level="patch"
          fi

          echo "level=$level" >> $GITHUB_OUTPUT

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (no auto-commit/tag)
        env:
          LEVEL: ${{ steps.bump.outputs.level }}
        run: |
          git pull --rebase origin main
          npm version "$LEVEL" --no-git-tag-version

      - name: Sync version to jsr.json and deno.json
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          # Update jsr.json version
          if [ -f jsr.json ]; then
            node -e "
              const fs = require('fs');
              const jsr = JSON.parse(fs.readFileSync('jsr.json', 'utf8'));
              jsr.version = '${NEW_VERSION}';
              fs.writeFileSync('jsr.json', JSON.stringify(jsr, null, 2) + '\n');
            "
          fi
          # Update deno.json version
          if [ -f deno.json ]; then
            node -e "
              const fs = require('fs');
              const deno = JSON.parse(fs.readFileSync('deno.json', 'utf8'));
              deno.version = '${NEW_VERSION}';
              fs.writeFileSync('deno.json', JSON.stringify(deno, null, 2) + '\n');
            "
          fi

      - name: Commit and tag release
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json jsr.json deno.json
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"

      - name: Push changes and tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin HEAD:main
          git push origin --tags

      - name: Get new version tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Created tag: $TAG"

      - name: Trigger release workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --field tag=${{ steps.get_tag.outputs.tag }}
