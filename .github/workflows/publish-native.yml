name: Publish praxis-native
on:
  push:
    tags: ['praxis-native-v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip npm publish)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  CARGO_INCREMENTAL: '0'
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: crates/praxis-native

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli

      - name: Build native addon
        run: napi build --platform --release --strip --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/praxis-native/praxis-native.*.node
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/praxis-native/artifacts

      - name: Move artifacts
        run: napi artifacts --dir artifacts

      - name: List packages
        run: ls -la npm/*/

      - name: Publish (dry run)
        if: ${{ inputs.dry_run == true }}
        run: |
          npm publish --dry-run
          for dir in npm/*/; do
            cd "$dir"
            npm publish --dry-run
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: ${{ inputs.dry_run != true }}
        run: |
          # Publish platform packages first
          for dir in npm/*/; do
            cd "$dir"
            npm publish --access public --provenance
            cd ../..
          done
          # Then the main package
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
